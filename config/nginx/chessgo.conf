## Frontend (SPA) — served at the root domain
server {
	client_max_body_size 1G;
	server_name chessgo.timanthonyalexander.de;
	root /var/www/chessgo/frontend/dist;
	include global;

	access_log /var/log/nginx/chessgo_access.log;
	error_log  /var/log/nginx/chessgo_error.log debug;

	# Long-lived immutable caching for Vite's content-hashed bundles. ^~ stops the
	# regex locations from `include global` (\.php$, \.oimg$) from ever matching here.
	location ^~ /assets/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
		try_files $uri =404;
	}

	# nginx serves .webmanifest as application/octet-stream by default; correct it.
	location = /site.webmanifest {
		default_type application/manifest+json;
	}

	# Icons must resolve to a real file or 404 — never fall through to the SPA
	# shell. Returning index.html (text/html, 200) for /favicon.ico makes browsers
	# treat it as "no icon" and show a stale/sibling-site favicon on this shared VPS.
	location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }

	# Static assets: a real file or a 404 — NEVER fall through to /index.html.
	# Otherwise nginx returns the SPA shell (text/html, 200) at e.g. a PNG URL,
	# and Cloudflare caches THAT against the PNG URL for hours. The chess piece
	# SVGs (/piece/cburnett/*.svg) are served here too. Add new asset extensions
	# here as they appear.
	location ~* \.(png|jpe?g|gif|webp|avif|svg|ico|mp4|webm|mp3|wav|woff2?|ttf|otf|eot)$ {
		try_files $uri =404;
	}

	location / {
		# Plain SPA: serve a real file if present, else fall back to the shell for
		# client-only routes (/bot, /puzzles, /game/:id, …).
		try_files $uri $uri/index.html $uri/ /index.html =404;
	}

	# Placeholder cert (valid chain, wrong hostname) so nginx can boot.
	# Replace via: sudo certbot --nginx -d chessgo.timanthonyalexander.de
    ssl_certificate /etc/letsencrypt/live/brandinio.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/brandinio.net/privkey.pem;
 	# managed by Certbot




}

## API (BaseAPI / PHP-FPM) + realtime hub (WebSocket) — chessgo-api.timanthonyalexander.de
server {
	server_name chessgo-api.timanthonyalexander.de;
	client_max_body_size 1G;
	root /var/www/chessgo/public;
	include global;

	# Extended timeouts: mirrors the other BaseAPI vhosts (rsrch/taa/shop/brandinio).
	fastcgi_read_timeout 600;
	fastcgi_send_timeout 600;
	fastcgi_connect_timeout 60;
	proxy_read_timeout 600;
	proxy_connect_timeout 60;
	proxy_send_timeout 600;

	access_log /var/log/nginx/chessgo_api_access.log;
	error_log  /var/log/nginx/chessgo_api_error.log debug;

	index index.php;

	# Realtime hub (gomachine) — WebSocket upgrade to the Go hub on 127.0.0.1:6467.
	# ^~ so it wins over the regex locations from `include global` (\.php$ etc).
	# The browser dials wss://chessgo-api.timanthonyalexander.de/ws (WS_PUBLIC_URL).
	location ^~ /ws {
		proxy_pass http://127.0.0.1:6467/ws;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 3600s;          # long-lived; hub sends a 30s ping heartbeat
		proxy_send_timeout 3600s;
	}

	# Serve gated downloads / static assets directly from storage if needed
	location ^~ /storage/ {
		disable_symlinks off;
		try_files $uri =404;
		expires 30d;
		add_header Cache-Control "public";
		access_log off;
	}

	location / {
		include php;
		add_header Content-Type application/json;
		autoindex on;
	}

	# Placeholder cert (valid chain, wrong hostname) so nginx can boot.
	# Replace via: sudo certbot --nginx -d chessgo-api.timanthonyalexander.de
    ssl_certificate /etc/letsencrypt/live/brandinio.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/brandinio.net/privkey.pem;
 	# managed by Certbot



}
